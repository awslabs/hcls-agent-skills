id: cell-type-annotation-01
prompt: 'You have completed a single-cell RNA-seq experiment on human peripheral blood
  mononuclear cells (PBMCs) from 8 healthy donors. After preprocessing and clustering
  with Scanpy, you have an AnnData object (`adata`) with 15,432 cells organized into
  12 Leiden clusters (resolution=0.5). The object contains normalized, log-transformed
  counts in `adata.X`, with raw counts stored in `adata.raw`. UMAP coordinates are
  stored in `adata.obsm[''X_umap'']`.


  You want to annotate cell types using **CellTypist** with the `Immune_All_Low.pkl`
  pretrained model. Your requirements are:


  1. Run CellTypist annotation in **majority voting mode** (grouped by Leiden clusters)
  with a minimum probability threshold of 0.5

  2. Store the predicted cell type labels and confidence scores back into the AnnData
  object

  3. Generate a **dotplot** showing the top 3 marker genes for each of the following
  expected cell types: CD4+ T cells (*IL7R, CD3D, CD4*), CD8+ T cells (*CD8A, CD8B,
  GZMB*), B cells (*MS4A1, CD79A, CD19*), NK cells (*GNLY, NKG7, KLRD1*), and Classical
  Monocytes (*CD14, LYZ, S100A8*)

  4. Produce a UMAP plot colored by the majority-voted cell type labels


  Please provide complete Python code using `celltypist`, `scanpy`, and `matplotlib`
  libraries, along with brief inline comments explaining each major step.'
target_skills:
- cell-type-annotation
domain: single-cell
difficulty: easy
