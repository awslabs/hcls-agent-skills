id: scrna-seq-pipeline-07
prompt: 'You are analyzing a single-cell RNA-seq dataset from a tumor microenvironment
  study involving 8 cancer patients (4 responders, 4 non-responders to immunotherapy).
  You have already loaded and merged the data into an AnnData object (`adata`) with
  45,000 cells and 33,000 genes. The `adata.obs` contains columns: `patient_id`, `response_status`
  (responder/non-responder), and `tissue_type` (tumor/adjacent_normal).


  During initial QC inspection, you notice the following per-cell metrics:

  - `n_genes_by_counts` ranges from 200 to 8,500 (median ~1,800)

  - `pct_counts_mt` ranges from 0.1% to 42%

  - `total_counts` ranges from 500 to 95,000


  After applying QC filters (`n_genes > 500`, `pct_counts_mt < 20%`, `total_counts
  < 50,000`), you retain 38,000 cells. You then perform standard normalization (normalize_total
  to 10,000, log1p), select the top 3,000 highly variable genes using `sc.pp.highly_variable_genes`
  with `batch_key=''patient_id''`, and run PCA (50 components).


  However, when you generate a UMAP colored by `patient_id`, you observe severe batch
  effects — cells cluster almost entirely by patient rather than by cell type. You
  decide to apply Harmony batch correction.


  Please provide:

  1. Complete Python code using `scanpy` and `harmonypy` to perform Harmony integration,
  recompute the neighbor graph, and generate corrected UMAP embeddings

  2. Code to run Leiden clustering at resolution 0.5 and visualize results colored
  by cluster, patient_id, and response_status simultaneously

  3. A strategy and code snippet for identifying marker genes for each Leiden cluster
  using `sc.tl.rank_genes_groups`, filtering for genes with `logfoldchange > 1.5`
  and `pval_adj < 0.01`

  4. Recommendations for validating whether Harmony sufficiently corrected the batch
  effects, including at least two quantitative metrics'
target_skills:
- scrna-seq-pipeline
domain: single-cell
difficulty: intermediate
