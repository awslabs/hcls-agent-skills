id: dicom-processing-07
prompt: 'Here is test question #7 of 10:


  ---


  You are working as a neuroimaging data engineer at a research hospital. Your team
  has acquired a multi-echo fMRI DICOM series from a Siemens Prisma 3T scanner for
  45 participants. The DICOM files are organized in a flat directory structure (all
  slices from all echoes mixed together in a single folder per subject), and each
  file follows the naming convention `MR.1.3.12.2.1107.5.2.43.67093.{timestamp}.dcm`.
  The series contains 4 echo times (TE = 12ms, 28ms, 44ms, 60ms), 240 volumes per
  echo, and 72 slices per volume.


  Your task is to convert this DICOM series to NIfTI format using `dcm2niix` while
  ensuring the output is correctly organized for multi-echo BIDS compliance. Specifically:


  1. Write a Python script using `subprocess` to invoke `dcm2niix` with appropriate
  flags that will correctly split echoes into separate NIfTI files, preserve the echo
  time metadata in the JSON sidecar, and name output files following BIDS convention
  (e.g., `sub-01_task-rest_echo-1_bold.nii.gz`).


  2. After conversion, write a `pydicom`-based validation function that reads a representative
  DICOM file from the series and confirms that the DICOM tags for EchoTime (0018,0081),
  RepetitionTime (0018,0080), and ImageOrientationPatient (0020,0037) are correctly
  propagated into the corresponding JSON sidecar fields generated by dcm2niix.


  3. Describe two common failure modes specific to multi-echo DICOM conversion with
  dcm2niix and how your script handles or detects them.


  Assume the input directory for subject 01 is `/data/raw/sub-01/fmri/` and the output
  should go to `/data/bids/sub-01/func/`.'
target_skills:
- dicom-processing
domain: imaging
difficulty: intermediate
