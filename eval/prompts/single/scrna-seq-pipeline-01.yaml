id: scrna-seq-pipeline-01
prompt: 'You are working with a single-cell RNA-seq dataset from a study of 8 healthy
  donor peripheral blood mononuclear cells (PBMCs). The raw data has been processed
  through Cell Ranger and is stored as 10X Genomics output directories (one per donor,
  named donor_01 through donor_08). Each sample contains approximately 3,000–5,000
  cells.


  Your task is to build a complete Scanpy preprocessing pipeline with the following
  requirements:


  **Data & QC Parameters:**

  - Load all 8 samples using `sc.read_10x_mtx()` and concatenate them into a single
  AnnData object with sample labels preserved

  - Filter cells with fewer than 200 or more than 5,000 genes detected

  - Remove cells where mitochondrial gene percentage exceeds 20%

  - Filter genes expressed in fewer than 3 cells


  **Analysis Steps:**

  - Normalize each cell to 10,000 total counts and log1p transform

  - Select the top 2,000 highly variable genes using the `seurat_v3` flavor

  - Scale data (zero mean, unit variance) before PCA

  - Run PCA with 50 components, then generate a UMAP embedding


  **Deliverables:**

  1. Complete, runnable Python code implementing all steps above using Scanpy

  2. Code to generate a violin plot showing QC metrics (n_genes_by_counts, total_counts,
  pct_counts_mt) before and after filtering

  3. A scatter plot of total_counts vs. pct_counts_mt colored by donor identity to
  visually inspect per-sample quality

  4. Brief explanation (3–4 sentences) of why log1p normalization is applied before
  HVG selection'
target_skills:
- scrna-seq-pipeline
domain: single-cell
difficulty: easy
