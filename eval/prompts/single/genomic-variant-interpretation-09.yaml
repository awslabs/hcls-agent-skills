id: genomic-variant-interpretation-09
prompt: 'A 34-year-old woman with a strong family history of breast and ovarian cancer
  undergoes germline panel testing. The laboratory reports the following variant:
  **BRCA2 c.8754+3A>G** (NM_000059.4). You have access to the following evidence:


  - **gnomAD v3.1.2**: allele frequency = 0.000008 (2 heterozygous alleles, 0 homozygous),
  popmax = 0.000012 (South Asian)

  - **SpliceAI scores**: DS_DL = 0.71, DS_AL = 0.04, DS_DG = 0.02, DS_AG = 0.08 (delta
  position: −3)

  - **ClinVar**: 2 submissions — one "VUS" (2019, no evidence provided), one "Likely
  Pathogenic" (2021, citing RNA studies)

  - **RNA splicing assay** (performed in-house): minigene assay shows ~65% aberrant
  transcripts with partial intron 21 retention, ~35% wild-type transcript

  - **REVEL score**: N/A (intronic variant)

  - **Family history**: proband''s mother and maternal aunt both had ovarian cancer
  diagnosed before age 50; no prior BRCA testing in family


  **Deliverables requested:**


  1. Apply PVS1 with appropriate strength modifier given the SpliceAI score and RNA
  evidence, citing the Tayoun et al. 2018 PVS1 decision framework.

  2. Enumerate all applicable ACMG/AMP 2015 criteria (codes, strength levels, and
  justification for each).

  3. Assign a final variant classification with confidence reasoning.

  4. Identify one key piece of additional evidence that would most likely upgrade
  or downgrade this classification, and explain why.'
target_skills:
- genomic-variant-interpretation
domain: genomics
difficulty: hard
