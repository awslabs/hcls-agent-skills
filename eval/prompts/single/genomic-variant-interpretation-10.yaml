id: genomic-variant-interpretation-10
prompt: 'A 34-year-old woman with a strong family history of breast and ovarian cancer
  undergoes germline panel testing. The laboratory reports the following variant:
  **BRCA2 c.8754+3A>G** (NM_000059.4). You have access to the following data:


  - **gnomAD v3.1.2**: allele frequency = 0.000008 (2 heterozygous alleles in 251,000
  chromosomes; no homozygotes)

  - **SpliceAI scores**: Donor loss = 0.61, Acceptor loss = 0.04, Donor gain = 0.02,
  Acceptor gain = 0.01

  - **MaxEntScan**: reference score = 8.4, alternate score = 3.1 (change = −5.3)

  - **ClinVar**: 2 submissions — one "Uncertain significance" (2019, no evidence provided)
  and one "Likely pathogenic" (2021, citing RNA studies showing partial exon 21 skipping
  in ~40% of transcripts)

  - **Functional RNA data**: The 2021 submitter''s RNA analysis showed two transcript
  populations: full-length (60%) and exon 21-skipped (40%); exon 21 skipping produces
  an in-frame deletion removing 41 amino acids from the DNA-binding domain

  - **BRCA2 exon 21**: encodes part of the OB2 fold critical for ssDNA binding; loss-of-function
  variants in this region are well-established as pathogenic


  Please provide: (1) a systematic ACMG/AMP criteria assessment identifying which
  specific criteria apply (with strength levels), (2) an overall variant classification
  with justification, (3) an explanation of why PVS1 application is nuanced here versus
  a canonical splice site variant, and (4) a recommendation for clinical reporting
  and genetic counseling implications for this patient and her at-risk relatives.'
target_skills:
- genomic-variant-interpretation
domain: genomics
difficulty: hard
