id: risk-adjustment-01
prompt: 'Here is test question #1 of 10:


  ---


  You are building a CMS-HCC risk adjustment pipeline for a Medicare Advantage plan
  with 12,000 members. Your raw claims data contains ICD-10 diagnosis codes extracted
  from the previous calendar year (2023), and you need to calculate RAF scores using
  the CMS-HCC Model V28 coefficients.


  Your data is stored in a PostgreSQL database with the following relevant tables:

  - `member_diagnoses(member_id VARCHAR, icd10_code VARCHAR, service_date DATE, provider_npi
  VARCHAR)`

  - `member_demographics(member_id VARCHAR, age INT, sex CHAR(1), medicaid_dual_flag
  BOOLEAN, long_term_institutional_flag BOOLEAN)`


  You have access to a Python environment with pandas and psycopg2 installed.


  **Please provide all of the following deliverables:**


  1. A SQL query that joins member diagnoses to an HCC crosswalk table (`hcc_crosswalk(icd10_code
  VARCHAR, hcc_code INT, hcc_label VARCHAR)`) and returns one row per member per valid
  HCC, deduplicated within the measurement year.


  2. Python code that applies CMS-HCC V28 hierarchy resolution rules for at least
  two disease hierarchies (diabetes and chronic kidney disease), removing lower-specificity
  HCCs when a higher-specificity HCC is present for the same member.


  3. Python code that calculates a final RAF score for each member by summing the
  applicable demographic coefficients (age/sex segment) plus disease HCC coefficients,
  using a simplified coefficient table you define inline as a Python dictionary.


  4. A brief explanation (3–5 sentences) of why hierarchy resolution must occur **before**
  summing HCC coefficients, and what scoring error would result if it were skipped.'
target_skills:
- risk-adjustment
domain: healthcare-ops
difficulty: easy
